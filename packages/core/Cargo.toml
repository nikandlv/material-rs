[package]
name = "material-rs"
version = "0.1.1"
edition = "2024"
description = "Material Design 3 Expressive component library for Rust and Yew"
license = "MIT"
repository = "https://github.com/nikandlv/material-rs"
homepage = "https://material-rs.nikan.dev"

[dependencies]
yew = { workspace = true }
stylist = { workspace = true }
web-sys = { workspace = true, features = [
    "Element",
    "DomRect",
    "Window",
    "Performance",
    "EventTarget",
    "HtmlElement",
    "HtmlInputElement",
    "HtmlDivElement",
    "HtmlButtonElement",
    "HtmlLabelElement",
    "HtmlAnchorElement",
    "HtmlProgressElement",
    "MouseEvent",
    "KeyboardEvent",
    "FocusEvent",
    "InputEvent",
    "AnimationEvent",
    "Touch",
    "TouchList",
    "TouchEvent",
    "Node",
    "NodeList",
    "Document",
    "CssStyleDeclaration",
    "ScrollBehavior",
    "Navigator",
    "Clipboard",
    "console",
] }
gloo-timers = { workspace = true }
wasm-bindgen = { workspace = true }
syntect = { workspace = true }
material-color-utils = { workspace = true }