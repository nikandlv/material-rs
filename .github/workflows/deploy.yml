name: Build, Publish & Deploy

on:
  push:
    branches: [main]

jobs:
  # ── Job 1: Bump version and commit ──
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version
        id: bump
        run: |
          CURRENT=$(grep '^version' packages/core/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          echo "new=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" packages/core/Cargo.toml
          echo "Bumped: $CURRENT -> $NEW_VERSION"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/core/Cargo.toml
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new }}"
          git push

  # ── Job 2: Build documentation ──
  build-docs:
    runs-on: ubuntu-latest
    needs: bump-version
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install trunk
        run: cargo install trunk

      - name: Install wasm-opt
        run: sudo apt-get update && sudo apt-get install -y binaryen

      - name: Cache Cargo deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: docs-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: docs-${{ runner.os }}-cargo-

      - name: Build documentation
        run: trunk build --release
        working-directory: apps/documentation

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-dist
          path: apps/documentation/dist

  # ── Job 3: Deploy to Cloudflare Pages ──
  deploy:
    runs-on: ubuntu-latest
    needs: build-docs
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-dist
          path: dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=material-rs

  # ── Job 4: Publish crate to crates.io ──
  publish-crate:
    runs-on: ubuntu-latest
    needs: bump-version
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: publish-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: publish-${{ runner.os }}-cargo-

      - name: Wait for version bump commit
        run: sleep 5

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p material-rs
