name: Build, Publish & Deploy

on:
  push:
    branches: [main]

jobs:
  # ── Job 1: Build documentation ──
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install trunk
        run: cargo install trunk

      - name: Install wasm-opt
        run: sudo apt-get update && sudo apt-get install -y binaryen

      - name: Cache Cargo deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: docs-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: docs-${{ runner.os }}-cargo-

      - name: Build documentation
        run: trunk build --release
        working-directory: apps/documentation

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-dist
          path: apps/documentation/dist

  # ── Job 2: Deploy to Cloudflare Pages ──
  deploy:
    runs-on: ubuntu-latest
    needs: build-docs
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-dist
          path: dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

  # ── Job 3: Publish crate to crates.io ──
  publish-crate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: publish-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: publish-${{ runner.os }}-cargo-

      - name: Copy README to core package
        run: cp README.md packages/core/README.md

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p material-rs --allow-dirty
